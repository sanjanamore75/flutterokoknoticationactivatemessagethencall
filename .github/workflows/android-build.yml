name: Android Cloud Build

# 1. Trigger: Tells GitHub to run this whenever you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # 2. Server: Tells GitHub to use a fresh Ubuntu Linux cloud computer
    runs-on: ubuntu-latest

    steps:
    # 3. Downloads your code onto the cloud computer
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Installs Java (required for Android builds)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 5. Gives the cloud computer permission to run your Gradle script
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 6. The actual build command (Generates a testing APK)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 7. Uploads the finished APK so you can download it from GitHub!
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Android-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
